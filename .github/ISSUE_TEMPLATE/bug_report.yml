name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Sign up at /signup
        2. Create a bot
        3. Upload doc.pdf
        4. ...
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Node version, OS, browser, deployment mode (local Docker / Vercel / etc.)
      placeholder: Node 22, macOS 15, Chrome, local docker compose
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / network response
      render: shell
