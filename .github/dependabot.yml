version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
          - "eslint-config-next"
        update-types:
          - minor
          - patch
      auth-stack:
        patterns:
          - "next-auth"
          - "@auth/*"
      db-stack:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
          - "postgres"
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    # Block ALL major bumps by default — they need a manual migration.
    # Cherry-pick specific packages by opening a PR yourself when the
    # migration is planned. Groups above only cover minor/patch bumps
    # for the packages they list, so anything outside a group (typescript,
    # vitest, plugin-react, etc.) also needs this catch-all rule to stop
    # dependabot from opening major-bump PRs.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    ignore:
      # Action major bumps almost never have behavioural impact for us —
      # treat them as opt-in rather than dependabot-driven noise.
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
