version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
          - "eslint-config-next"
        update-types:
          - minor
          - patch
      auth-stack:
        patterns:
          - "next-auth"
          - "@auth/*"
      db-stack:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
          - "postgres"
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    # Major bumps for these packages need a manual migration. Skip until
    # we've planned the upgrade, then bump the floor in package.json.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    ignore:
      # Action major bumps almost never have behavioural impact for us —
      # treat them as opt-in rather than dependabot-driven noise.
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
